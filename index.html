<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#6366F1">
  <title>AI 助教工作台</title>
  <style>
    :root {
      --bg-main: #fafafa;
      --surface: #ffffff;
      --surface-soft: rgba(255, 255, 255, 0.76);
      --surface-muted: #f5f7fb;

      --danger: #dc2626;
      --danger-light: rgba(239, 68, 68, 0.1);
      --success: #16a34a;
      --success-light: rgba(22, 163, 74, 0.1);
      --warning: #ea580c;

    }
    * { box-sizing: border-box; }
    html, body { min-height: 100%; margin: 0; }
    body { background: radial-gradient(circle at top left, rgba(99, 102, 241, 0.06), transparent 22%), radial-gradient(circle at 88% 12%, rgba(14, 165, 233, 0.05), transparent 18%), var(--bg-main); color: var(--text-main); line-height: 1.7; -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility; }

    h1, h2, h3, h4, h5, h6 { margin: 0 0 18px; color: var(--text-main); line-height: 1.08; letter-spacing: -0.04em; }

    small, time { color: var(--text-soft); }
    svg { display: block; }

    .sr-only { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0, 0, 0, 0); border: 0; }
    .page-shell { min-height: 100vh; padding: var(--page-padding); }
    .courseware-page-shell { padding: var(--page-padding); }

    .message-page-shell, .discussion-page-shell, .overview-page-shell { height: 100vh; overflow: hidden; }
    .message-page-shell .rail-shell, .discussion-page-shell .rail-shell { top: var(--page-padding); min-height: calc(100vh - (var(--page-padding) * 2)); }
    .app-shell { display: grid; grid-template-columns: var(--sidebar-width) minmax(0, 1fr); gap: 32px; align-items: start; }
    .auth-shell { display: grid; grid-template-columns: minmax(0, 1.1fr) minmax(360px, 460px); gap: 32px; align-items: stretch; }

    .auth-stage, .auth-card, .metric-card, .section-shell, .hero-panel, .overview-primary, .overview-side > .surface, .placeholder-card, .panel-card, .contact-panel, .chat-panel, .loading-card, .empty-surface { padding: 28px; }

    .discussion-focus-workspace, .overview-focus-workspace { height: calc(100vh - (var(--page-padding) * 2)); min-height: 0; grid-template-rows: auto auto minmax(0, 1fr); overflow: hidden; }

    .field input:focus, .field select:focus, .field textarea:focus, .reply-form input:focus, .message-composer textarea:focus, .class-switcher select:focus { border-color: rgba(99, 102, 241, 0.42); box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.08); }
    .field select, .class-switcher select { appearance: none; background-image: linear-gradient(45deg, transparent 50%, #94a3b8 50%), linear-gradient(135deg, #94a3b8 50%, transparent 50%); background-position: calc(100% - 18px) calc(50% - 3px), calc(100% - 12px) calc(50% - 3px); background-size: 6px 6px, 6px 6px; background-repeat: no-repeat; padding-right: 40px; }

    .sheet-actions { padding-top: 8px; }

    .nav-list { display: grid; gap: 6px; }

    .rail-profile { width: 48px; height: 48px; display: grid; place-items: center; border-radius: 16px; background: var(--surface-muted); color: var(--text-main); font-weight: 800; box-shadow: inset 0 0 0 1px var(--border-light); }

    function renderMetricCard(value, label, tone = "") {
      const icons = {
        blue: `<svg viewBox="0 0 24 24"><path d="M4 19h16"/><path d="M7 16V9"/><path d="M12 16V5"/><path d="M17 16v-4"/></svg>`,

        red: `<svg viewBox="0 0 24 24"><path d="m4 6 8 6 8-6"/><path d="M4 6h16v12H4z"/></svg>`,
      };
      return `<article class="metric-card ${tone}"><div class="metric-icon ${tone}">${icons[tone] || icons.blue}</div><div class="metric-copy"><strong>${escapeHtml(formatCount(value))}</strong><span>${escapeHtml(label)}</span></div></article>`;
    }
    function renderSectionTitle(title, subline = "") { return `<div class="section-title"><h3>${escapeHtml(title)}</h3>${subline ? `<p>${escapeHtml(subline)}</p>` : ""}</div>`; }
    function renderInlineRichText(text = "") { return escapeHtml(text).replace(/`([^`]+)`/g, "<code>$1</code>").replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>").replace(/\*([^*\n]+)\*/g, "<em>$1</em>"); }
    function truncateText(text = "", limit = 120) { const value = String(text || "").trim(); if (value.length <= limit) return value; return `${value.slice(0, limit).trimEnd()}...`; }
    
    function renderRichText(content = "") {
      const lines = String(content).replace(/\r\n?/g, "\n").split("\n");
      const blocks = []; let paragraph = []; let listItems = []; let listTag = "";
      const flushParagraph = () => { if (!paragraph.length) return; blocks.push(`<p>${renderInlineRichText(paragraph.join(" "))}</p>`); paragraph = []; };
      const flushList = () => { if (!listItems.length || !listTag) return; blocks.push(`<${listTag}>${listItems.map((item) => `<li>${renderInlineRichText(item)}</li>`).join("")}</${listTag}>`); listItems = []; listTag = ""; };
      lines.forEach((line) => {
        const trimmed = line.trim();
        if (!trimmed) { flushParagraph(); flushList(); return; }
        const headingMatch = trimmed.match(/^(#{1,3})\s+(.*)$/);
        if (headingMatch) { flushParagraph(); flushList(); const level = Math.min(5, 2 + headingMatch[1].length); blocks.push(`<h${level}>${renderInlineRichText(headingMatch[2])}</h${level}>`); return; }
        const unorderedMatch = trimmed.match(/^[-*]\s+(.*)$/);
        if (unorderedMatch) { flushParagraph(); if (listTag && listTag !== "ul") flushList(); listTag = "ul"; listItems.push(unorderedMatch[1]); return; }
        const orderedMatch = trimmed.match(/^\d+\.\s+(.*)$/);
        if (orderedMatch) { flushParagraph(); if (listTag && listTag !== "ol") flushList(); listTag = "ol"; listItems.push(orderedMatch[1]); return; }
        paragraph.push(trimmed);
      });
      flushParagraph(); flushList();
      return blocks.join("") || `<p>${renderInlineRichText(content)}</p>`;
    }

    function stopMessagePolling() {
      state.messageSyncEnabled = false;

    async function runMessageSyncLoop() {
      while (state.messageSyncEnabled && state.route === "messages" && state.token) {
        const controller = new AbortController(); state.messageSyncAbortController = controller;
        try {
          const data = await api(buildPath("/api/messages/events", { cursor: state.messageEventCursor }), { signal: controller.signal });
          if (!state.messageSyncEnabled || state.route !== "messages") break;
          if (typeof data.cursor === "number") state.messageEventCursor = data.cursor;
          if (data.changed) await syncMessagesSilently();
        } catch (error) {
          if (!state.messageSyncEnabled || error.name === "AbortError") break;
          await sleep(1200);
        } finally {
          if (state.messageSyncAbortController === controller) state.messageSyncAbortController = null;
        }
      }
      state.messageSyncLoop = null;
    }

    function ensureMessagePolling() { if (state.messageSyncLoop) return; state.messageSyncEnabled = true; state.messageSyncLoop = runMessageSyncLoop(); }

      if (!username) { setStatus("请输入用户名", "error"); return; }
      try {
        setStatus("登录中...");
        const { data, error } = await supabaseClient.auth.signInWithPassword({
          email:    username + "@user.local",
          password: password,
        });
        if (error) throw error;
        state.token = data.session.access_token;
        state.user  = mapSupabaseUser(data.user);
        state.messageEventCursor = 0; state.editingManagedUserId = null;
        state.route = "overview"; setStatus(""); await renderApp();
      } catch (error) { setStatus(error.message || "用户名或密码错误", "error"); }

    async function handleRegister(event) {
      event.preventDefault();
      const formData = new FormData(event.currentTarget);

      const password = formData.get("password");
      const role     = formData.get("role") || "student";
      if (!username) { setStatus("请输入用户名", "error"); return; }
      if (username.length < 3) { setStatus("用户名至少 3 个字符", "error"); return; }
      try {
        setStatus("注册中...");
        const { data, error } = await supabaseClient.auth.signUp({
          email:    username + "@user.local",
          password: password,
          options:  { data: { username, display_name: username, role, student_number: null } },

        if (error) throw error;
        if (!data.session) {
          setStatus("注册已提交！请前往 Supabase 控制台 Authentication > Providers > Email，关闭 Confirm email 后再试。", "error");

              <button class="ai-fab ${state.aiDrawerOpen ? "hidden" : ""}" data-ai-open-drawer type="button">✨ 唤醒 AI 助教</button>
              ${state.aiDrawerOpen ? `
                <div class="ai-drawer-backdrop" data-close-ai-drawer></div>
                <aside class="assistant-drawer open">
                  <div class="assistant-drawer-head"><div><span class="eyebrow">AI Tutor</span><h4>课件即时提问</h4></div><button class="toast-close" type="button" data-close-ai-drawer>&times;</button></div>
                  <div class="ai-assistant-toolbar"><div class="suggestion-row">${["总结核心内容", "梳理知识结构", "提供学习建议"].map((item) => `<button class="suggestion-chip" type="button" data-ai-suggestion="${item}">${item}</button>`).join("")}</div></div>
                  <div class="chat-stream" id="ai-chat-stream">${renderAiConversationMarkup()}</div>
                  <div class="prompt-shell assistant-prompt-shell">
                    <form id="qa-form" class="form-grid chat-composer"><div class="field prompt-field"><textarea id="qa-question" name="question" placeholder="输入你的问题">${escapeHtml(state.qaDraft)}</textarea></div><div class="button-row prompt-actions"><button class="ghost-btn" type="button" id="clear-qa-btn">清空</button><button class="primary-btn send-btn" type="submit" ${state.qaLoading ? "disabled" : ""}>发送</button></div></form>
                  </div>
                </aside>
              ` : ""}
            </section>
          ` : `<article class="course-empty-panel panel-card">${renderEmpty("选择一份课件后查看详情")}</article>`}
        </section>
      `;

      document.querySelectorAll("[data-courseware-select]").forEach((button) => { button.addEventListener("click", async () => { state.activeCoursewareId = Number(button.dataset.coursewareSelect); state.aiDrawerOpen = false; await renderCoursewares(); }); });
      document.querySelectorAll("[data-ai-toggle-drawer]").forEach((node) => { node.addEventListener("click", async () => { await setAiDrawerOpen(!state.aiDrawerOpen); }); });
      document.querySelectorAll("[data-ai-open-drawer]").forEach((node) => { node.addEventListener("click", async () => { await setAiDrawerOpen(true); }); });
      document.querySelectorAll("[data-close-ai-drawer]").forEach((node) => { node.addEventListener("click", async () => { await setAiDrawerOpen(false); }); });

      const qaForm = document.getElementById("qa-form");
      if (qaForm) {
        qaForm.addEventListener("submit", async (e) => {
          e.preventDefault(); const current = getCurrentCourseware(); const textarea = e.currentTarget.querySelector("textarea"); const question = textarea.value.trim(); if (!question) return;
          try {
            state.qaLoading = true; state.qaDraft = ""; await renderCoursewares();
            const data = await api("/api/ai/messages", { method: "POST", body: { courseware_id: current.id, question } });
            state.qaLoading = false; state.qaMessages = data.messages || []; if (textarea) textarea.value = "";
            syncAiConversationUi(); syncAiComposerUi();
          } catch (error) {}
        });
      }
      const qaTextarea = document.getElementById("qa-question"); if (qaTextarea) qaTextarea.addEventListener("input", (e) => { state.qaDraft = e.currentTarget.value; });
      document.querySelectorAll("[data-ai-suggestion]").forEach((button) => { button.addEventListener("click", () => { state.qaDraft = button.dataset.aiSuggestion; const textarea = document.getElementById("qa-question"); if (textarea) { textarea.value = state.qaDraft; textarea.focus(); } }); });
    }

    async function renderEvaluations() {
      if (!state.currentClassId) return renderNoClassState("暂无班级", "先在班级页创建或加入班级，再查看反馈。");
      const [coursewareData, evaluationData] = await Promise.all([api(buildPath("/api/coursewares", { class_id: state.currentClassId })), api(buildPath("/api/evaluations", { class_id: state.currentClassId }))]);
      state.coursewares = coursewareData.coursewares; state.evaluations = evaluationData.evaluations;
      const content = document.getElementById("content-area");

      if (state.user.role === "teacher") {
        content.innerHTML = `<section class="stats-strip">${renderMetricCard(state.evaluations.length, "反馈总数", "blue")}${renderMetricCard(4.2, "平均分数", "green")}</section><section class="surface">${renderSectionTitle("反馈记录")}<div class="list-stack">${state.evaluations.length ? state.evaluations.map((item) => `<div class="feedback-card"><div class="resource-head"><div><h4>${escapeHtml(displayCoursewareTitle(item.courseware_title))}</h4><span>${escapeHtml(item.course_name)} · ${escapeHtml(item.student_name)}</span></div><time>${escapeHtml(item.created_at)}</time></div><p>${escapeHtml(item.suggestion || "无")}</p></div>`).join("") : renderEmpty("暂无")}</div></section>`; return;
      }

      const showSheet = state.sheet?.type === "evaluation";
      content.innerHTML = `<section class="surface section-shell"><div class="section-toolbar">${renderSectionTitle("我的反馈记录")}<div class="button-row"><button class="primary-btn" id="open-evaluation-sheet" type="button">提交反馈</button></div></div><div class="list-stack separated-list">${state.evaluations.length ? state.evaluations.map((item) => `<article class="feedback-card"><div class="resource-head"><div><h4>${escapeHtml(displayCoursewareTitle(item.courseware_title))}</h4><span>${escapeHtml(item.course_name)}</span></div><time>${escapeHtml(item.created_at)}</time></div><p>${escapeHtml(item.suggestion || "无")}</p></article>`).join("") : renderEmpty("还没有提交反馈")}</div></section>${showSheet ? `<div class="sheet-shell">${renderSheetShell({ eyebrow: "提交反馈", title: "完成学习评价", body: renderEvaluationForm() })}</div>` : ""}`;
      document.getElementById("open-evaluation-sheet")?.addEventListener("click", async () => { state.sheet = { type: "evaluation" }; await renderEvaluations(); });
      document.getElementById("evaluation-form")?.addEventListener("submit", async (e) => { e.preventDefault(); await api("/api/evaluations", { method: "POST" }); closeSheet(); setStatus("提交成功。"); await renderEvaluations(); });
      if (showSheet) bindSheetClose(async () => { closeSheet(); await renderEvaluations(); });
    }

    async function renderDiscussions() {
      if (!state.currentClassId) return renderNoClassState("暂无班级", "先在班级页创建或加入班级，再参与讨论。");
      const data = await api(buildPath("/api/discussions", { class_id: state.currentClassId })); state.discussions = data.discussions;
      const activeDiscussion = state.discussions.find((item) => item.id === state.activeDiscussionId) || null;
      const content = document.getElementById("content-area"); const showSheet = state.sheet?.type === "discussion";
      
      content.innerHTML = `
        <section class="discussion-page-layout">
          ${activeDiscussion ? `
            <article class="surface section-shell discussion-detail-panel"><div class="discussion-detail-body"><aside class="discussion-body-card"><div class="discussion-side-top"><button class="ghost-btn slim-btn" id="close-discussion-detail" type="button">返回列表</button></div><div class="discussion-side-meta"><span class="soft-badge">当前主题</span><div class="discussion-side-title">${escapeHtml(activeDiscussion.title)}</div></div><div class="discussion-body-block"><div class="discussion-body-content">${escapeHtml(activeDiscussion.body).replaceAll("\n", "<br>")}</div></div></aside><section class="discussion-reply-shell"><div class="discussion-reply-toolbar-line"><div class="section-title"><h3>主题回复</h3></div></div><div class="reply-list discussion-reply-list">${activeDiscussion.replies.length ? activeDiscussion.replies.map((reply) => `<div class="reply-item discussion-reply-item"><div class="card-line"><strong>${escapeHtml(reply.author_name)}</strong></div><span>${escapeHtml(reply.body)}</span></div>`).join("") : '<div class="subtle-text">暂无回复</div>'}</div><form class="reply-form discussion-detail-form" data-discussion-id="${activeDiscussion.id}"><input name="body" placeholder="输入回复内容"><button class="primary-btn" type="submit">发送回复</button></form></section></div></article>
          ` : `
            <article class="surface section-shell discussion-list-panel"><div class="section-toolbar">${renderSectionTitle("讨论列表")}<div class="button-row"><button class="primary-btn" id="open-discussion-sheet" type="button">发布主题</button></div></div><div class="list-stack separated-list discussion-topic-list teacher-scroll-list">${state.discussions.length ? state.discussions.map((item) => `<article class="discussion-topic-card" data-open-discussion="${item.id}" tabindex="0" role="button"><div class="resource-head"><div><h4>${escapeHtml(item.title)}</h4><span>${escapeHtml(item.author_name)}</span></div></div><p>${escapeHtml(truncateText(item.body, 140))}</p></article>`).join("") : renderEmpty("当前没有讨论内容")}</div></article>
          `}
        </section>
        ${showSheet ? `<div class="sheet-shell">${renderSheetShell({ eyebrow: "发布主题", title: "创建新的讨论", body: renderDiscussionForm() })}</div>` : ""}
      `;

      document.getElementById("open-discussion-sheet")?.addEventListener("click", async () => { state.sheet = { type: "discussion" }; await renderDiscussions(); });
      document.getElementById("discussion-form")?.addEventListener("submit", async (e) => { e.preventDefault(); await api("/api/discussions", { method: "POST" }); closeSheet(); setStatus("主题发布成功。"); await renderDiscussions(); });
      document.querySelectorAll("[data-open-discussion]").forEach((node) => { node.addEventListener("click", async () => { state.activeDiscussionId = Number(node.dataset.openDiscussion); await renderDiscussions(); }); });
      document.getElementById("close-discussion-detail")?.addEventListener("click", async () => { state.activeDiscussionId = null; await renderDiscussions(); });
      document.querySelectorAll(".reply-form").forEach((form) => { form.addEventListener("submit", async (e) => { e.preventDefault(); await api(`/api/discussions/replies`, { method: "POST" }); setStatus("回复已发送。"); await renderDiscussions(); }); });
      if (showSheet) bindSheetClose(async () => { closeSheet(); await renderDiscussions(); });
    }

    function renderConversationListMarkup() { return state.conversations.length ? state.conversations.map((conversation) => `<div class="conversation-row compact-contact-row ${state.activeConversationId === conversation.user.id ? "active" : ""}"><button class="contact-card" data-conversation-id="${conversation.user.id}"><div class="contact-meta"><strong>${escapeHtml(conversation.user.display_name)}</strong></div></button><div class="conversation-tools">${conversation.unread_count ? `<span class="count-badge">${conversation.unread_count}</span>` : ""}<div class="row-actions"><button class="danger-btn slim-btn" data-remove-conversation="${conversation.user.id}">移除</button></div></div></div>`).join("") : renderEmpty("会话列表为空"); }
    function renderMessageContactsMarkup() { return state.users.length ? state.users.map((contact) => `<div class="member-card compact-contact-row"><div class="contact-meta"><strong>${escapeHtml(contact.display_name)}</strong></div><div class="row-actions">${contact.has_conversation ? '<span class="soft-badge">已在列表</span>' : `<button class="secondary-btn slim-btn" data-add-conversation="${contact.id}">添加</button>`}</div></div>`).join("") : renderEmpty("当前班级没有其他联系人"); }
    function renderMessageStreamMarkup() { return state.threadMessages.length ? state.threadMessages.map((message) => `<div class="message-bubble ${message.sender_id === state.user.id ? "mine" : "other"}"><p>${escapeHtml(message.body)}</p><time>${escapeHtml(message.created_at)}</time></div>`).join("") : renderEmpty("还没有消息"); }
    async function syncMessagesSilently() { if (state.route !== "messages" || !state.currentClassId) return; await renderMessages({ preserveDraft: document.getElementById("message-body")?.value || "" }); }

    async function renderMessages(options = {}) {
      if (!state.currentClassId) { stopMessagePolling(); renderNoClassState("暂无班级", "先加入班级，再开始私信。"); return; }
      const [contactsData, conversationsData] = await Promise.all([api(buildPath("/api/messages/contacts", { class_id: state.currentClassId })), api("/api/messages/conversations")]);
      state.users = contactsData.contacts; state.conversations = conversationsData.conversations;
      const visibleUsers = state.conversations.map((item) => item.user);
      if (!visibleUsers.find((item) => item.id === state.activeConversationId)) state.activeConversationId = visibleUsers[0]?.id || null;
      const target = getConversationTarget();
      if (target) { const threadData = await api(`/api/messages/thread/${target.id}`); state.threadMessages = threadData.messages; } else { state.threadMessages = []; }

      document.getElementById("content-area").innerHTML = `
        <section class="message-layout message-focus-layout">
          <section class="message-sidebar-stack">
            <article class="surface contact-panel message-contact-panel">${renderSectionTitle("会话列表")}<div class="message-pane-scroll"><div class="list-stack conversation-stack" id="conversation-list">${renderConversationListMarkup()}</div></div><div class="inline-divider"></div>${renderSectionTitle("班级联系人")}<div class="message-pane-scroll"><div class="list-stack" id="contact-list">${renderMessageContactsMarkup()}</div></div></article>
          </section>
          <article class="surface chat-panel">
            ${target ? `<div class="chat-header"><div><h3 id="message-target-name">${escapeHtml(target.display_name)}</h3></div></div><div class="message-stream" id="message-stream">${renderMessageStreamMarkup()}</div><form id="message-form" class="message-composer"><textarea id="message-body" name="body" placeholder="输入消息内容"></textarea><button class="primary-btn" type="submit">发送</button></form>` : renderEmpty("先从左侧添加或选择一个会话")}
          </article>
        </section>
      `;

      const conversationList = document.getElementById("conversation-list");
      if (conversationList) {
        conversationList.addEventListener("click", async (event) => {
          const openButton = event.target.closest("[data-conversation-id]");
          if (openButton) { state.activeConversationId = Number(openButton.dataset.conversationId); await renderMessages(); return; }
          const removeButton = event.target.closest("[data-remove-conversation]");
          if (removeButton) { try { await api(`/api/messages/conversations/${removeButton.dataset.removeConversation}`, { method: "DELETE" }); setStatus("会话已移除。"); await renderMessages(); } catch (error) {} }
        });
      }

      const contactList = document.getElementById("contact-list");
      if (contactList) {
        contactList.addEventListener("click", async (event) => {
          const addButton = event.target.closest("[data-add-conversation]");
          if (!addButton) return;
          try { await api("/api/messages/conversations", { method: "POST" }); state.activeConversationId = Number(addButton.dataset.addConversation); setStatus("已加入列表。"); await renderMessages(); } catch (error) {}
        });
      }

      const messageForm = document.getElementById("message-form");
      if (messageForm && target) {
        messageForm.addEventListener("submit", async (event) => {
          event.preventDefault(); const textarea = document.getElementById("message-body");
          try { await api("/api/messages", { method: "POST" }); if (textarea) textarea.value = ""; setStatus("消息已发送。"); await syncMessagesSilently(); } catch (error) {}
        });
      }
      if (options.preserveDraft) { const textarea = document.getElementById("message-body"); if (textarea) textarea.value = options.preserveDraft; }
      ensureMessagePolling();
    }

    // 启动应用
    bootstrap();
  </script>
</body>
</html>
